services:
  - type: web
    name: sistema-contable-chile-backend
    runtime: node
    rootDir: backend
    # NUNCA usar --force-reset aquí: borra toda la base de datos en cada deploy.
    # ensure-admin garantiza que el usuario admin exista tras un reset (idempotente).
    buildCommand: npm install && npx prisma generate && npx prisma db push && node prisma/ensure-admin.js
    startCommand: node index.js
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: HTTPS_ENABLED
        value: "true"
      # Rellena estos en el dashboard de Render (no los pongas en este archivo):
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: ADMIN_API_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: BACKUP_ENABLED
        value: "false"
      - key: UIT_ACTUAL
        value: "65446"
      - key: TASA_IVA
        value: "0.19"
      - key: RETENCION_HONORARIOS
        value: "0.10"
      - key: AFP_APORTE_TRABAJADOR
        value: "0.10"
      - key: SIS_TASA
        value: "0.0153"
      - key: SALUD_TASA
        value: "0.07"
      - key: AFC_CONTRATA
        value: "0.006"
      - key: AFC_PLAZO_FIJO
        value: "0.024"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "200"
      - key: RATE_LIMIT_WRITE_MAX
        value: "60"
      - key: UPLOAD_MAX_SIZE
        value: "52428800"
      - key: UPLOAD_DIR
        value: uploads
