version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:3001
    networks:
      - contable-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/contable.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN:-change-me-admin-token}
      - CORS_ORIGINS=http://localhost
      - HTTPS_ENABLED=false
    volumes:
      - db-data:/app/data
      - uploads-data:/app/uploads
      - logs-data:/app/logs
      - backups-data:/app/backups
    networks:
      - contable-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db-backup:
    image: alpine:latest
    volumes:
      - db-data:/source:ro
      - backups-data:/backups
    command: sh -c "cp /source/contable.db /backups/contable-$(date +%Y%m%d-%H%M%S).db"
    profiles:
      - backup

volumes:
  db-data:
  uploads-data:
  logs-data:
  backups-data:

networks:
  contable-net:
    driver: bridge
